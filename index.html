        // 6. DETAILED SHEET: Exterior
        addDetailedSheet("Exterior", "exterior");
        
        // Write XLSX binary
        const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'binary' });
        function s2ab(s) {
          const buf = new ArrayBuffer(s.length);
          const view = new Uint8Array(buf);
          for (let i = 0; i < s.length; i++) view[i] = s.charCodeAt(i) & 0xFF;
          return buf;
        }
        
        function dataURLtoBlob(dataurl) {
          try {
            const arr = dataurl.split(',');
            const mime = arr[0].match(/:(.*?);/)[1];
            const bstr = atob(arr[1]);
            let n = bstr.length;
            const u8arr = new Uint8Array(n);
            while(n--) {
              u8arr[n] = bstr.charCodeAt(n);
            }
            return new Blob([u8arr], { type: mime });
          } catch(e) {
            console.error("Error converting data URL to blob:", e);
            return null;
          }
        }
        
        // ----------------------------------------------------
        // ZIP GENERATION (WITH PHOTOS)
        // ----------------------------------------------------
        let photos = [];
        if (typeof getAllPhotosForProject === 'function') {
          try {
            photos = await getAllPhotosForProject(project.id);
          } catch (e) {
            console.error("Failed to load photos:", e);
          }
        }

        const zip = new JSZip();
        
        // Add Excel spreadsheet
        zip.file("Estimate.xlsx", s2ab(wbout), { binary: true });
        
        // Add photos folder
        const photoFolder = zip.folder("photos");
        const nameCounts = {};
        
        photos.forEach((photo) => {
          const item = ITEMS[photo.itemId];
          const itemName = item ? item.name.replace(/[^a-z0-9]/gi, '_') : photo.itemId;
          const roomName = photo.roomId 
            ? (project.rooms.find(r => r.id === photo.roomId)?.name || 'room').replace(/[^a-z0-9]/gi, '_') 
            : 'global';
          
          const fileBase = `${roomName}_${photo.roomId || 'global'}_${itemName}`;
          nameCounts[fileBase] = (nameCounts[fileBase] || 0) + 1;
          const filename = `${fileBase}_${nameCounts[fileBase]}.jpg`;
          
          const blob = dataURLtoBlob(photo.dataUrl);
          if (blob) {
            photoFolder.file(filename, blob);
          }
        });
        
        // Generate Zip download
        const content = await zip.generateAsync({ type: "blob" });
        const link = document.createElement("a");
        const safeName = project.name.replace(/[^a-z0-9]/gi, '_').toLowerCase();
        link.href = URL.createObjectURL(content);
        link.download = `SparkEstimate_${safeName}.zip`;
        link.click();
        URL.revokeObjectURL(link.href);
        console.log(`✅ Project "${project.name}" exported successfully with photos!`);


      } catch (err) {
        console.error("Export failed:", err);
        alert(`Failed to export project: ${err.message}`);
      }
    }

    // Expose to debugging object
    if (window.__debug) {
      window.__debug.exportProject = exportProject;
    }
  </script>

  <!-- =====================================================
       PHOTO CAPTURE & INDEXEDDB SYSTEM
  ====================================================== -->
  <script>
    /* === PHOTO CAPTURE & INDEXEDDB === */
    const DB_NAME = 'SparkEstimatorDB';
    const DB_VERSION = 1;
    const STORE_NAME = 'photos';

    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = function(e) {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            const store = db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
            store.createIndex('projectId', 'projectId', { unique: false });
            store.createIndex('project_item', ['projectId', 'itemId', 'roomId'], { unique: false });
          }
        };
        request.onsuccess = function(e) {
          resolve(e.target.result);
        };
        request.onerror = function(e) {
          reject(e.target.error);
        };
      });
    }

    function getAllPhotosForProject(projectId) {
      return openDB().then(db => {
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, 'readonly');
          const store = tx.objectStore(STORE_NAME);
          const index = store.index('projectId');
          const request = index.getAll(projectId);
          
          request.onsuccess = function() {
            resolve(request.result || []);
          };
          request.onerror = function(e) {
            reject(e.target.error);
          };
        });
      });
    }

    function loadPhotosForProject(projectId) {
      if (!state.photoCache) state.photoCache = {};
      state.photoCache[projectId] = {};
      
      return getAllPhotosForProject(projectId).then(photos => {
        photos.forEach(photo => {
          const key = photo.roomId ? `${photo.roomId}:${photo.itemId}` : photo.itemId;
          if (!state.photoCache[projectId][key]) {
            state.photoCache[projectId][key] = [];
          }
          state.photoCache[projectId][key].push(photo);
        });
        console.log(`Loaded ${photos.length} photos from IndexedDB into cache for project ${projectId}`);
      }).catch(err => {
        console.error("Failed to load photos into cache:", err);
      });
    }

    function compressImage(file, maxWidth = 1024, quality = 0.7) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = new Image();
          img.onload = function() {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;
            
            if (width > height) {
              if (width > maxWidth) {
                height = Math.round((height * maxWidth) / width);
                width = maxWidth;
              }
            } else {
              if (height > maxWidth) {
                width = Math.round((width * maxWidth) / height);
                height = maxWidth;
              }
            }
            
            canvas.width = width;
            canvas.height = height;
            
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            
            try {
              const compressedDataUrl = canvas.toDataURL('image/jpeg', quality);
              resolve(compressedDataUrl);
            } catch(err) {
              reject(err);
            }
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function savePhoto(projectId, itemId, roomId, dataUrl) {
      const photo = {
        projectId,
        itemId,
        roomId: roomId || null,
        dataUrl,
        timestamp: Date.now()
      };
      
      return openDB().then(db => {
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, 'readwrite');
          const store = tx.objectStore(STORE_NAME);
          const request = store.add(photo);
          
          request.onsuccess = function(e) {
            photo.id = e.target.result;
            
            const key = roomId ? `${roomId}:${itemId}` : itemId;
            if (!state.photoCache[projectId]) state.photoCache[projectId] = {};
            if (!state.photoCache[projectId][key]) state.photoCache[projectId][key] = [];
            state.photoCache[projectId][key].push(photo);
            
            resolve(photo);
          };
          
          request.onerror = function(e) {
            reject(e.target.error);
          };
        });
      });
    }

    function deletePhoto(projectId, itemId, roomId, photoId) {
      return openDB().then(db => {
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, 'readwrite');
          const store = tx.objectStore(STORE_NAME);
          const request = store.delete(photoId);
          
          request.onsuccess = function() {
            const key = roomId ? `${roomId}:${itemId}` : itemId;
            if (state.photoCache[projectId] && state.photoCache[projectId][key]) {
              state.photoCache[projectId][key] = state.photoCache[projectId][key].filter(p => p.id !== photoId);
            }
            resolve();
          };
          
          request.onerror = function(e) {
            reject(e.target.error);
          };
        });
      });
    }

    function openPhotoPicker(uniqueId) {
      const parts = uniqueId.split(':');
      const itemId = parts.length > 1 ? parts[1] : parts[0];
      const roomId = parts.length > 1 ? parts[0] : null;
      const projectId = state.currentProjectId;

      if (!projectId) {
        alert("No active project selected.");
        return;
      }

      // Create hidden file input
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.capture = 'environment';
      input.style.display = 'none';

      input.onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;

        // Show a simple loading toast
        const toast = document.createElement('div');
        toast.textContent = "Compressing photo...";
        toast.style.position = 'fixed';
        toast.style.bottom = '80px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.background = 'rgba(0,0,0,0.8)';
        toast.style.color = '#fff';
        toast.style.padding = '10px 20px';
        toast.style.borderRadius = '20px';
        toast.style.zIndex = '9999';
        toast.style.fontSize = '0.9rem';
        toast.style.fontWeight = '600';
        document.body.appendChild(toast);

        compressImage(file)
          .then(dataUrl => {
            return savePhoto(projectId, itemId, roomId, dataUrl);
          })
          .then(() => {
            toast.textContent = "Photo saved!";
            setTimeout(() => toast.remove(), 1000);
            render();
          })
          .catch(err => {
            console.error("Photo capture failed:", err);
            alert(`Failed to save photo: ${err.message}`);
            toast.remove();
          });
      };

      document.body.appendChild(input);
      input.click();
      setTimeout(() => input.remove(), 1000); // Clean up DOM
    }

    // Expose helpers to debugging object
    window.__photo = {
      openDB,
      getAllPhotosForProject,
      loadPhotosForProject,
      compressImage,
      savePhoto,
      deletePhoto,
      openPhotoPicker
    };

    if (window.__debug) {
      Object.assign(window.__debug, window.__photo);
    }
  </script>

  <!-- =====================================================
       SETTINGS & PRICE OVERRIDES
  ====================================================== -->
  <script>
    /* === SETTINGS & PRICE OVERRIDES === */
    
    // Toast Notification System
    function showToast(msg) {
      // Remove any existing toast first
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();
      
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = msg;
      document.body.appendChild(toast);
      
      // Auto remove after 2.5 seconds (in sync with CSS animation)
      setTimeout(() => {
        if (toast.parentNode) toast.remove();
      }, 2500);
    }
    
    // CSV Manual Parsing Logic with proper quote support and column detection
    function splitCSVLine(line) {
      const result = [];
      let cell = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') {
          if (inQuotes && line[i + 1] === '"') {
            cell += '"';
            i++; // skip next quote
          } else {
            inQuotes = !inQuotes;
          }
        } else if (c === ',' && !inQuotes) {
          result.push(cell.trim());
          cell = '';
        } else {
          cell += c;
        }
      }
      result.push(cell.trim());
      return result;
    }

    function parseCSV(text) {
      const lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
      if (lines.length === 0) return [];

      // Parse the first line to check for headers
      const firstLineFields = splitCSVLine(lines[0]);
      let idIndex = 0;
      let costIndex = 1;
      let hasHeader = false;

      // Check if the first line is indeed a header
      const isHeaderField = (f) => {
        const lf = f.toLowerCase();
        return lf === 'id' || lf === 'cost' || lf === 'price' || lf === 'name' || lf === 'unit';
      };

      if (firstLineFields.some(isHeaderField)) {
        hasHeader = true;
        // Find indices of 'id' and 'cost' or 'price'
        const idCol = firstLineFields.findIndex(f => f.toLowerCase() === 'id');
        const costCol = firstLineFields.findIndex(f => f.toLowerCase() === 'cost' || f.toLowerCase() === 'price');
        
        if (idCol !== -1) idIndex = idCol;
        if (costCol !== -1) costIndex = costCol;
      }

      const overrides = [];
      const startIdx = hasHeader ? 1 : 0;

      for (let i = startIdx; i < lines.length; i++) {
        const fields = splitCSVLine(lines[i]);
        if (fields.length > Math.max(idIndex, costIndex)) {
          const id = fields[idIndex].replace(/^["']|["']$/g, '');
          const costVal = fields[costIndex].replace(/^["']|["']$/g, '');
          // Strip dollar signs, commas, or spaces from cost
          const cost = parseFloat(costVal.replace(/[^0-9.-]/g, ''));
          
          if (id && !isNaN(cost)) {
            overrides.push({ id, cost });
          }
        }
      }
      return overrides;
    }
    
    // Update reset button visibility in settings modal and list of overrides
    function updateResetButtonVisibility() {
      const resetBtn = document.getElementById('reset-prices-btn');
      if (resetBtn) {
        const hasOverrides = Object.keys(state.priceOverrides).length > 0;
        resetBtn.style.display = hasOverrides ? 'block' : 'none';
      }
      
      const container = document.getElementById('overridden-prices-list');
      if (container) {
        const keys = Object.keys(state.priceOverrides);
        if (keys.length === 0) {
          container.innerHTML = '<p class="settings-desc" style="font-style: italic; margin-top: 10px;">No global overrides active.</p>';
          return;
        }
        
        let html = '<h4 style="font-size: 0.85rem; margin-top: 14px; margin-bottom: 8px;">Active Global Overrides:</h4>';
        html += '<ul style="list-style: none; display: flex; flex-direction: column; gap: 4px; font-size: 0.8rem; padding: 0; max-height: 120px; overflow-y: auto; border: 1px solid var(--border); border-radius: 6px; padding: 8px; background: var(--bg-primary);">';
        
        keys.forEach(id => {
          const itemDef = getItemDefinition(id);
          const name = itemDef ? itemDef.name : id;
          const cost = state.priceOverrides[id];
          html += `
            <li style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed var(--border); padding-bottom: 4px; margin-bottom: 4px;">
              <span style="max-width: 70%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${name}">${name}</span>
              <span style="font-weight: 600; color: var(--accent);">${formatCurrency(cost)}</span>
            </li>
          `;
        });
        
        html += '</ul>';
        container.innerHTML = html;
      }
    }
    
    // Inline Price Override Action
    function handleOverridePrice(uniqueId) {
      const project = getCurrentProject();
      if (!project) return;
      
      const parts = uniqueId.split(':');
      const itemId = parts.length > 1 ? parts[1] : parts[0];
      const roomId = parts.length > 1 ? parts[0] : null;
      
      const itemDef = getItemDefinition(itemId);
      if (!itemDef) return;
      
      const itemState = getItemState(project, itemId, roomId);
      const currentCost = getItemCost(itemDef, itemState);
      
      const promptText = `Enter new unit cost for "${itemDef.name}" (${itemDef.unit}):`;
      const response = prompt(promptText, currentCost);
      if (response === null) return; // Cancelled
      
      if (response.trim() === '') {
        // Reset/Clear override
        itemState.priceOverride = null;
        showToast(`Reset price for ${itemDef.name} to default`);
        scheduleSave();
        render();
      } else {
        const newCost = parseFloat(response.trim());
        if (!isNaN(newCost) && newCost >= 0) {
          itemState.priceOverride = newCost;
          showToast(`Updated price for ${itemDef.name} to ${formatCurrency(newCost)}`);
          scheduleSave();
          render();
        } else {
          alert("Please enter a valid positive number.");
          return;
        }
      }
      
      scheduleSave();
      render();
    }
    
    // Add Custom Line Item
    function handleAddCustomItem(sectionId, roomId = null) {
      const project = getCurrentProject();
      if (!project) return;
      
      const name = prompt("Enter Custom Item Name:");
      if (!name || !name.trim()) return;
      
      const costStr = prompt("Enter Unit Cost:", "0");
      if (costStr === null) return;
      const cost = parseFloat(costStr.trim());
      if (isNaN(cost) || cost < 0) {
        alert("Please enter a valid positive cost.");
        return;
      }
      
      const unit = prompt("Enter Unit Type (e.g. sqft, ea., LF, flat):", "flat");
      if (unit === null) return;
      
      const cleanRoomId = roomId === 'null' ? null : roomId;
      
      const newItem = {
        id: 'custom_' + Date.now(),
        name: name.trim(),
        cost: cost,
        unit: unit.trim() || 'flat',
        custom: true,
        sectionId: sectionId,
        roomId: cleanRoomId
      };
      
      if (!project.customItems) project.customItems = [];
      project.customItems.push(newItem);
      
      // Initialize its state (checked by default with Qty=1)
      const key = cleanRoomId ? `${cleanRoomId}:${newItem.id}` : newItem.id;
      project.items[key] = {
        checked: true,
        qty: '1',
        year: '',
        notes: '',
        priceOverride: null
      };
      
      showToast(`Added custom item: ${newItem.name}`);
      scheduleSave();
      render();
    }
    
    // Delete Custom Line Item
    // Note: custom delete button triggers handleDeleteCustomItem with (itemId, roomId)
    function handleDeleteCustomItem(customItemId, roomId = null) {
      const project = getCurrentProject();
      if (!project) return;
      
      const itemDef = getItemDefinition(customItemId);
      const itemName = itemDef ? itemDef.name : "Custom Item";
      
      if (confirm(`Are you sure you want to delete the custom item "${itemName}"?`)) {
        project.customItems = project.customItems.filter(item => item.id !== customItemId);
        
        // Remove item state
        const key = roomId ? `${roomId}:${customItemId}` : customItemId;
        delete project.items[key];
        
        showToast(`Deleted custom item: ${itemName}`);
        scheduleSave();
        render();
      }
    }
    
    // Wire up settings modal events after DOM is loaded
    document.addEventListener('DOMContentLoaded', () => {
      let selectedFile = null;
      
      const selectBtn = document.getElementById('select-csv-btn');
      const fileInput = document.getElementById('csv-file-input');
      const fileNameLabel = document.getElementById('selected-file-name');
      const uploadBtn = document.getElementById('upload-csv-btn');
      const resetBtn = document.getElementById('reset-prices-btn');
      
      if (selectBtn && fileInput) {
        selectBtn.addEventListener('click', () => fileInput.click());
      }
      
      if (fileInput) {
        fileInput.addEventListener('change', (e) => {
          selectedFile = e.target.files[0];
          if (selectedFile) {
            fileNameLabel.textContent = selectedFile.name;
            uploadBtn.disabled = false;
          } else {
            fileNameLabel.textContent = "No file selected";
            uploadBtn.disabled = true;
          }
        });
      }
      
      if (uploadBtn) {
        uploadBtn.addEventListener('click', () => {
          if (!selectedFile) return;
          
          const reader = new FileReader();
          reader.onload = function(e) {
            const text = e.target.result;
            try {
              const overrides = parseCSV(text);
              if (overrides.length === 0) {
                alert("No valid rows found in CSV. Expected columns: id, cost.");
                return;
              }
              
              overrides.forEach(ov => {
                state.priceOverrides[ov.id] = ov.cost;
              });
              
              savePriceOverrides();
              showToast(`Updated ${overrides.length} prices globally.`);
              updateResetButtonVisibility();
              
              // Close modal
              document.getElementById('settings-modal').classList.remove('open');
              
              // Clear selected file
              selectedFile = null;
              fileInput.value = '';
              fileNameLabel.textContent = "No file selected";
              uploadBtn.disabled = true;
              
              render();
            } catch(err) {
              alert(`Failed to parse CSV: ${err.message}`);
            }
          };
          reader.readAsText(selectedFile);
        });
      }
      
      if (resetBtn) {
        resetBtn.addEventListener('click', () => {
          if (confirm("Are you sure you want to reset all global price overrides to default? This will also clear all project-specific overrides.")) {
            state.priceOverrides = {};
            state.projects.forEach(p => {
              Object.values(p.items).forEach(itemState => {
                itemState.priceOverride = null;
              });
            });
            savePriceOverrides();
            scheduleSave();
            updateResetButtonVisibility();
            document.getElementById('settings-modal').classList.remove('open');
            showToast("Reset all prices to defaults.");
            render();
          }
        });
      }
    });

    // Expose helpers globally
    window.__settings = {
      showToast,
      parseCSV,
      updateResetButtonVisibility,
      handleOverridePrice,
      handleAddCustomItem,
      handleDeleteCustomItem
    };
    if (window.__debug) {
      Object.assign(window.__debug, window.__settings);
    }
  </script>

  <!-- =====================================================
       DEAL ANALYZER LOGIC
  ====================================================== -->
  <script>
    /* === DEAL ANALYZER === */
    document.addEventListener('DOMContentLoaded', () => {
      const fab = document.getElementById('deal-analyzer-fab');
      const modal = document.getElementById('deal-analyzer-modal');
      const closeBtn = document.getElementById('close-deal-btn');
      
      window.addEventListener('deal-needs-refresh', () => {
        if (modal && modal.classList.contains('open') && typeof recalculateDeal === 'function') {
          recalculateDeal();
        }
      });
      
      const arvInput = document.getElementById('deal-arv');
      const purchaseInput = document.getElementById('deal-purchase');
      const holdingInput = document.getElementById('deal-holding');
      const repairsInput = document.getElementById('deal-repair-total');
      
      const profitOutput = document.getElementById('deal-output-profit');
      const roiOutput = document.getElementById('deal-output-roi');
      const maoOutput = document.getElementById('deal-output-mao');
      const ratingBadge = document.getElementById('deal-rating');
      
      let holdingCostsEdited = false;
      
      // Auto-recalculate when inputs change
      arvInput.addEventListener('input', () => {
        const arv = parseFloat(arvInput.value) || 0;
        if (!holdingCostsEdited) {
          holdingInput.value = arv > 0 ? Math.round(arv * 0.1) : '';
        }
        recalculateDeal();
      });
      
      purchaseInput.addEventListener('input', recalculateDeal);
      
      holdingInput.addEventListener('input', () => {
        holdingCostsEdited = true;
        if (holdingInput.value.trim() === '') {
          holdingCostsEdited = false; // Reset if cleared
        }
        recalculateDeal();
      });
      
      // Open / Close actions
      if (fab && modal) {
        fab.addEventListener('click', () => {
          // Sync current repair total
          const project = getCurrentProject();
          if (project) {
            const repairTotal = getRunningTotal(project);
            repairsInput.value = formatCurrency(repairTotal);
          } else {
            repairsInput.value = '$0';
          }
          
          modal.classList.add('open');
          recalculateDeal();
        });
      }
      
      if (closeBtn && modal) {
        closeBtn.addEventListener('click', () => {
          modal.classList.remove('open');
        });
      }
      
      if (modal) {
        modal.addEventListener('click', (e) => {
          if (e.target === modal) {
            modal.classList.remove('open');
          }
        });
      }
      
      // Swipe-down to close on touch devices
      const modalContent = modal ? modal.querySelector('.modal-content') : null;
      if (modalContent) {
        let startY = 0;
        let isDragging = false;
        
        modalContent.addEventListener('touchstart', (e) => {
          // Check if dragging from the drag handle or near the top
          if (e.target.closest('.drag-handle') || e.target.closest('.modal-header')) {
            startY = e.touches[0].clientY;
            isDragging = true;
            modalContent.style.transition = 'none';
          }
        }, { passive: true });
        
        modalContent.addEventListener('touchmove', (e) => {
          if (!isDragging) return;
          const currentY = e.touches[0].clientY;
          const deltaY = currentY - startY;
          if (deltaY > 0) {
            modalContent.style.transform = `translateY(${deltaY}px)`;
          }
        }, { passive: true });
        
        modalContent.addEventListener('touchend', (e) => {
          if (!isDragging) return;
          isDragging = false;
          modalContent.style.transition = 'transform 0.25s ease';
          
          const endY = e.changedTouches[0].clientY;
          const deltaY = endY - startY;
          
          if (deltaY > 100) {
            modal.classList.remove('open');
            modalContent.style.transform = '';
          } else {
            modalContent.style.transform = '';
          }
        });
      }
      
      function recalculateDeal() {
        window.recalculateDeal = recalculateDeal;
        const project = getCurrentProject();
        const repairs = project ? getRunningTotal(project) : 0;
        
        const parseMoney = val => parseFloat(String(val).replace(/[^0-9.-]+/g, '')) || 0;
        const arv = parseMoney(arvInput.value);
        const purchase = parseMoney(purchaseInput.value);
        const holding = parseMoney(holdingInput.value);
        
        // Sync repair display
        repairsInput.value = formatCurrency(repairs);
        
        // Check for basic data presence
        if (arv === 0 && purchase === 0) {
          profitOutput.textContent = '—';
          roiOutput.textContent = '—';
          maoOutput.textContent = '—';
          ratingBadge.className = 'deal-rating-badge avoid';
          ratingBadge.textContent = 'Avoid (No Data)';
          return;
        }
        
        const profit = arv - purchase - repairs - holding;
        const roiDenom = purchase + repairs;
        const roi = roiDenom > 0 ? (profit / roiDenom) * 100 : 0;
        const mao = (arv * 0.70) - repairs;
        
        // Render Output text
        profitOutput.textContent = formatCurrency(profit);
        if (profit >= 0) {
          profitOutput.className = 'analyzer-output-val profit-positive';
        } else {
          profitOutput.className = 'analyzer-output-val profit-negative';
        }
        
        roiOutput.textContent = `${roi.toFixed(1)}%`;
        if (roi >= 0) {
          roiOutput.className = 'analyzer-output-val profit-positive';
        } else {
          roiOutput.className = 'analyzer-output-val profit-negative';
        }
        
        maoOutput.textContent = formatCurrency(mao);
        
        // Rating evaluation
        const isGreat = roi >= 20 && purchase <= mao;
        const isAvoid = roi < 10 || purchase > (mao * 1.10);
        
        if (isAvoid) {
          ratingBadge.className = 'deal-rating-badge avoid';
          ratingBadge.textContent = '🔴 Avoid';
        } else if (isGreat) {
          ratingBadge.className = 'deal-rating-badge great';
          ratingBadge.textContent = '🟢 Great';
        } else {
          ratingBadge.className = 'deal-rating-badge marginal';
          ratingBadge.textContent = '🟡 Marginal';
        }
      }
    });
  </script>
